<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>时光足迹 - 网页 App</title>
    <!-- 引入 React 和 Tailwind (CDN 方式，无需本地环境) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [state, setState] = useState({
                isStarted: false,
                startTime: null,
                lastMarkTime: null,
                selectedTag: "默认",
                tags: ["健身", "办公", "通勤", "用餐", "午休", "阅读", "摸鱼", "洗漱"],
                logs: [],
            });

            const [showTagModal, setShowTagModal] = useState(false);
            const [showResetModal, setShowResetModal] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editingIndex, setEditingIndex] = useState(null);
            const [newTag, setNewTag] = useState("");
            const [currentTime, setCurrentTime] = useState(Date.now());
            const [wakeLock, setWakeLock] = useState(null);
            const [toast, setToast] = useState({ show: false, message: "" });

            useEffect(() => {
                const saved = localStorage.getItem('timetracker_github_v1');
                if (saved) setState(JSON.parse(saved));
                const timer = setInterval(() => setCurrentTime(Date.now()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                localStorage.setItem('timetracker_github_v1', JSON.stringify(state));
            }, [state]);

            const showToast = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: "" }), 2000);
            };

            const formatDuration = (ms) => {
                const s = Math.floor((ms / 1000) % 60);
                const m = Math.floor((ms / (1000 * 60)) % 60);
                const h = Math.floor(ms / (1000 * 60 * 60));
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const formatTime = (ts) => new Date(ts).toLocaleTimeString('zh-CN', { hour12: false });

            const startDay = () => {
                const now = Date.now();
                setState(prev => ({ ...prev, isStarted: true, startTime: now, lastMarkTime: now, logs: [] }));
                showToast("☀️ 开启新的一天");
            };

            const markMoment = () => {
                const now = Date.now();
                const durationMs = now - state.lastMarkTime;
                const newLog = { start: state.lastMarkTime, end: now, durationMs, durationStr: formatDuration(durationMs), tag: state.selectedTag };
                setState(prev => ({ ...prev, lastMarkTime: now, logs: [...prev.logs, newLog] }));
                showToast(`记录: ${state.selectedTag}`);
            };

            const handleFinalReset = () => {
                setState(prev => ({ ...prev, isStarted: false, startTime: null, lastMarkTime: null, logs: [] }));
                setShowResetModal(false);
                showToast("✅ 已结算重置");
            };

            const exportCSV = () => {
                let csv = "\uFEFF开始,结束,时长,标签\n";
                state.logs.forEach(l => { csv += `${formatTime(l.start)},${formatTime(l.end)},${l.durationStr},${l.tag}\n`; });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `时光记录_${new Date().toLocaleDateString()}.csv`;
                a.click();
            };

            return (
                <div className="min-h-screen pb-32">
                    {/* Header */}
                    <div className="p-4 flex justify-between items-center max-w-md mx-auto">
                        <div>
                            <h1 className="text-xl font-black text-indigo-600">时光足迹</h1>
                            <p className="text-[10px] text-slate-400 font-bold uppercase">{new Date().toLocaleDateString('zh-CN', {weekday: 'long', month: 'short', day: 'numeric'})}</p>
                        </div>
                        <button onClick={() => setShowResetModal(true)} className="text-[10px] bg-red-50 text-red-600 px-3 py-1.5 rounded-full font-black border border-red-100 active-scale">结算今日</button>
                    </div>

                    <div className="max-w-md mx-auto px-4 space-y-6">
                        {/* Timer Card */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-indigo-100/50 text-center space-y-6 border border-white">
                            <div className="space-y-1">
                                <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">今日总清醒</p>
                                <p className="text-5xl font-black text-slate-900 tabular-nums">{state.isStarted ? formatDuration(currentTime - state.startTime) : "00:00:00"}</p>
                            </div>
                            <div className="h-px bg-slate-100 w-full"></div>
                            <div className="space-y-1">
                                <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">当前阶段</p>
                                <p className="text-3xl font-bold text-indigo-600 tabular-nums">{state.isStarted ? formatDuration(currentTime - state.lastMarkTime) : "00:00:00"}</p>
                            </div>
                        </div>

                        {!state.isStarted ? (
                            <button onClick={startDay} className="w-full py-8 bg-indigo-600 text-white rounded-[2rem] text-xl font-black shadow-xl active-scale">☀️ 开启新的一天</button>
                        ) : (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center px-1">
                                        <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">选择标签</h2>
                                        <button onClick={() => setShowTagModal(true)} className="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">管理库</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {state.tags.map(tag => (
                                            <button key={tag} onClick={() => setState(s => ({...s, selectedTag: tag}))} className={`px-5 py-3 rounded-2xl text-xs font-bold transition-all active-scale ${state.selectedTag === tag ? 'bg-indigo-600 text-white shadow-lg ring-4 ring-indigo-100' : 'bg-white text-slate-500 border border-slate-200'}`}>{tag}</button>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={markMoment} className="w-full py-10 bg-slate-900 text-white rounded-[2.5rem] text-xl font-black shadow-2xl active-scale flex flex-col items-center">
                                    <span>📍 记录并开始下一段</span>
                                    <span className="text-[10px] font-medium text-slate-400">标记为: {state.selectedTag}</span>
                                </button>
                            </div>
                        )}

                        {/* Logs */}
                        <div className="space-y-4">
                            <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest px-1">今日记录 (点击修改)</h2>
                            <div className="space-y-3">
                                {state.logs.length === 0 ? <div className="text-center py-10 text-slate-400 text-xs font-bold border-2 border-dashed border-slate-200 rounded-3xl">暂无记录</div> : 
                                [...state.logs].reverse().map((log, idx) => {
                                    const realIdx = state.logs.length - 1 - idx;
                                    return (
                                        <div key={idx} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
                                            <div className="space-y-1">
                                                <div className="flex items-center gap-2">
                                                    <span onClick={() => { setEditingIndex(realIdx); setShowEditModal(true); }} className="px-2 py-1 bg-indigo-50 text-indigo-600 text-[9px] font-black rounded-lg border border-indigo-100 cursor-pointer">{log.tag} ✎</span>
                                                    <span className="text-[10px] text-slate-300 font-mono">{formatTime(log.start)} - {formatTime(log.end)}</span>
                                                </div>
                                                <p className="text-xl font-black text-slate-800">{log.durationStr}</p>
                                            </div>
                                            <button onClick={() => { if(confirm("删除记录？")) setState(s => ({...s, logs: s.logs.filter((_, i) => i !== realIdx)})) }} className="p-2 text-slate-200 hover:text-red-400">✕</button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* Footer Export */}
                    <div className="fixed bottom-6 left-4 right-4 max-w-md mx-auto glass p-2 rounded-2xl shadow-2xl flex gap-2 z-40">
                        <button onClick={exportCSV} className="w-full py-3 bg-slate-900 text-white text-xs font-bold rounded-xl active-scale">导出 Excel (CSV) 备份数据</button>
                    </div>

                    {/* Modals 简写省略部分逻辑以节省空间，功能完整 */}
                    {showResetModal && (
                        <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center p-6 z-[100] backdrop-blur-md">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-sm p-8 space-y-6">
                                <h3 className="text-xl font-black text-center">结算并重置今日？</h3>
                                <div className="flex flex-col gap-2">
                                    <button onClick={handleFinalReset} className="w-full py-4 bg-red-500 text-white rounded-2xl font-black active-scale">确认结算并重置</button>
                                    <button onClick={() => setShowResetModal(false)} className="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showTagModal && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-6 z-50 backdrop-blur-md">
                            <div className="bg-white rounded-[2rem] w-full max-w-sm p-8 space-y-4">
                                <h3 className="text-xl font-black">标签管理</h3>
                                <div className="flex gap-2">
                                    <input type="text" id="tagInput" placeholder="新标签..." className="flex-1 px-4 py-3 bg-slate-100 rounded-xl outline-none" />
                                    <button onClick={() => {
                                        const val = document.getElementById('tagInput').value;
                                        if(val) { setState(s => ({...s, tags: [...s.tags, val]})); document.getElementById('tagInput').value = ""; }
                                    }} className="bg-indigo-600 text-white px-5 rounded-xl font-bold">添加</button>
                                </div>
                                <div className="max-h-60 overflow-y-auto space-y-2">
                                    {state.tags.map((tag, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-4 bg-slate-50 rounded-xl">
                                            <span>{tag}</span>
                                            <button className="text-red-500 text-xs" onClick={() => setState(s => ({...s, tags: s.tags.filter((_, i) => i !== idx)}))}>删除</button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setShowTagModal(false)} className="w-full py-4 bg-slate-100 rounded-xl font-black">关闭</button>
                            </div>
                        </div>
                    )}

                    {showEditModal && (
                        <div className="fixed inset-0 bg-slate-900/80 flex items-end justify-center z-[60] backdrop-blur-sm">
                            <div className="bg-white rounded-t-[2.5rem] w-full max-w-sm p-8 space-y-6 animate-in slide-in-from-bottom">
                                <h3 className="text-xl font-black">修改标签</h3>
                                <div className="grid grid-cols-2 gap-3 max-h-72 overflow-y-auto">
                                    {state.tags.map(tag => (
                                        <button key={tag} onClick={() => {
                                            const newLogs = [...state.logs]; newLogs[editingIndex].tag = tag;
                                            setState(s => ({...s, logs: newLogs})); setShowEditModal(false);
                                        }} className="px-4 py-4 bg-slate-50 rounded-2xl text-sm font-black border active-scale">{tag}</button>
                                    ))}
                                </div>
                                <button onClick={() => setShowEditModal(false)} className="w-full py-4 bg-slate-100 rounded-xl font-bold">取消</button>
                            </div>
                        </div>
                    )}

                    <div className={`fixed top-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-bold transition-all z-[110] ${toast.show ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>{toast.message}</div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
